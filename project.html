<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Lynn van der Hoorn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #C7C3FF;
      --dark: #19060C;
      --accent: #C8B89A;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #19060C;
      color: #C7C3FF;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    .cursor {
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: transform 0.1s;
    }
    .cursor-ring {
      width: 40px; height: 40px;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, transform 0.15s;
      mix-blend-mode: difference;
    }
    .cursor-ring.hovering { width: 64px; height: 64px; }

    /* ── NAV ── */
    .proj-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.6rem 2.5rem;
      border-bottom: 1px solid rgba(245,240,232,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
      background: #19060C;
    }
    .proj-nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      font-style: italic;
      color: rgba(245,240,232,0.7);
      text-decoration: none;
    }
    .proj-nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .proj-nav-links a {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.7);
      text-decoration: none;
      transition: color 0.2s;
    }
    .proj-nav-links a:hover { color: #C7C3FF; }

    /* ── HEADER ── */
    .proj-header {
      padding: 5rem 2.5rem 3rem;
      border-bottom: 1px solid rgba(245,240,232,0.1);
    }
    .proj-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.4);
      margin-bottom: 1.2rem;
    }
    .proj-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3.5rem, 8vw, 9rem);
      line-height: 0.9;
      color: #C7C3FF;
      margin-bottom: 4rem;
    }
    .proj-intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }
    .proj-desc-text p {
      font-size: 1rem;
      line-height: 1.75;
      color: rgba(245,240,232,0.75);
      margin-bottom: 1.2rem;
    }
    .proj-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem 3rem;
    }
    .proj-meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .proj-meta-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.35);
    }
    .proj-meta-value {
      font-size: 0.95rem;
      color: #C7C3FF;
      line-height: 1.5;
    }

    /* ── IMAGES ── */
    .proj-images {
      padding: 5rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .proj-img-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .proj-img-3col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2rem;
    }
    .proj-img-4col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 2rem;
    }
    .proj-img-placeholder {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .proj-img-placeholder::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        rgba(25,6,12,0.06) 0px,
        rgba(25,6,12,0.06) 1px,
        transparent 1px,
        transparent 24px
      );
    }
    .proj-img-full .proj-img-placeholder {
      width: 100%;
    }
    .proj-img-placeholder {
      background: #19060C !important; /* no colored extensions visible */
    }
    .proj-img-placeholder img {
      width: 100%;
      height: auto;
      display: block;
      position: relative;
      z-index: 1;
      border-radius: 12px;
    }
    .proj-img-placeholder::after { display: none; }
    .proj-video {
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
      height: auto;
      display: block;
      background: #0a0a0a;
    }
    .proj-media-wrap {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      display: flex;
      height: auto !important;
    }

    /* ── NEXT PROJECT ── */
    .proj-next {
      border-top: 1px solid rgba(245,240,232,0.1);
      padding: 6rem 2.5rem 8rem;
      text-align: center;
    }
    .proj-next-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.35);
      margin-bottom: 1.5rem;
    }
    .proj-next-link {
      text-decoration: none;
      display: inline-block;
    }
    .proj-next-title {
      display: block;
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 8vw, 8rem);
      font-style: italic;
      color: #C7C3FF;
      line-height: 1;
      transition: opacity 0.25s;
    }
    .proj-next-link:hover .proj-next-title { opacity: 0.6; }

    /* ── FOOTER (same as main) ── */
    .site-footer { background: #19060C; }

    .footer-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 420px;
      border-top: 1px solid rgba(245,240,232,0.1);
    }
    .footer-img-block {
      display: flex;
      align-items: stretch;
      border-right: 1px solid rgba(245,240,232,0.1);

    .footer-img-placeholder {
      width: 100%;
      background: rgba(245,240,232,0.03);

      align-items: flex-end;
      padding: 2.5rem;

    .footer-img-text {

      font-size: clamp(3rem, 6vw, 7rem);
      line-height: 0.9;
      color: rgba(245,240,232,0.08);
      letter-spacing: 0.04em;

    .footer-form-block {
      padding: 5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .footer-form-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 5.5vw, 6.5rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: #FD3B08;
      margin-bottom: 3rem;
    }
    .footer-form { display: flex; flex-direction: column; gap: 0; }
    .footer-field {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid rgba(245,240,232,0.2);
      padding: 1rem 0;
    }
    .footer-field label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(245,240,232,0.6);
      margin-bottom: 0.2rem;
    }
    .footer-field input {
      background: transparent;
      border: none;
      outline: none;
      color: #C7C3FF;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: 0.2rem 0;
    }
    .footer-field input::placeholder { color: rgba(245,240,232,0.25); }
    .footer-submit {
      margin-top: 2rem;
      align-self: flex-start;
      background: transparent;
      border: 1px solid rgba(245,240,232,0.4);
      color: #C7C3FF;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.8rem 2.5rem;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }
    .footer-submit:hover { background: #C7C3FF; color: #19060C; }
    .footer-mid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 2rem 4rem;
      border-top: 1px solid rgba(245,240,232,0.1);
    }
    .footer-socials { display: flex; gap: 2.5rem; }
    .footer-socials a {
      font-size: 0.82rem;
      color: rgba(245,240,232,0.7);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;

    .footer-socials a:hover { color: #C7C3FF; }
    .footer-logo-center { font-size: 1.8rem; color: #FD3B08; text-align: center; }
    .footer-info { display: flex; gap: 3rem; justify-content: flex-end; }
    .footer-info-col { display: flex; flex-direction: column; gap: 0.2rem; text-align: right; }

    .footer-info-label {
      font-weight: 700;
      letter-spacing: 0.06em;
      color: rgba(245,240,232,0.4) !important;
      font-size: 0.68rem !important;

    .footer-copy {

      padding: 1.2rem 4rem;
      border-top: 1px solid rgba(245,240,232,0.08);
    }

    /* Footer strips */
    .footer-strips { overflow: hidden; }
    .footer-strip-row { height: 48px; display: flex; align-items: stretch; overflow: hidden; position: relative; }
    .footer-strip-inner { display: inline-flex; flex-shrink: 0; height: 100%; }
    .footer-strip-block { width: 48px; height: 100%; flex-shrink: 0; }
    .footer-strip-left .footer-strip-inner  { animation: footerLeft  6s linear infinite; }
    .footer-strip-right .footer-strip-inner { animation: footerRight 6s linear infinite; }
    @keyframes footerLeft  { from { transform: translateX(0); }     to { transform: translateX(-96px); } }
    @keyframes footerRight { from { transform: translateX(-96px); } to { transform: translateX(0); } }
  </style>
</head>

    const colors2 = ['#C7C3FF', '#19060C', '#C7C3FF', '#19060C'];
    function buildStrip(id, colors) {
      const el = document.getElementById(id);
      const count = Math.ceil(window.innerWidth / 48) * 3 + 4;
      let html = '<div class="footer-strip-inner">';
      for (let i = 0; i < count; i++) {
        html += `<div class="footer-strip-block" style="background:${colors[i % colors.length]}"></div>`;
      }
      html += '</div>';
      el.innerHTML = html;
    }
    buildStrip('fs1', colors1);
    buildStrip('fs2', colors2);

    // ── CURSOR ──
    const cur = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx = -100, my = -100, rx = -100, ry = -100;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function animate() {
      rx += (mx - rx) * 0.15;
      ry += (my - ry) * 0.15;
      cur.style.left = mx + 'px';
      cur.style.top = my + 'px';
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(animate);
    })();
    document.querySelectorAll('a, button, [role="button"]').forEach(el => {
      el.addEventListener('mouseenter', () => ring.classList.add('hovering'));
      el.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
    });
  </script>
